name: CI/CD — Mimito Dev

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install flask flask-sqlalchemy flask-mail psycopg2-binary
          pip install pytest

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short --no-header

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: tests/

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    timeout-minutes: 5

    steps:
      - name: Trigger Render Deploy
        uses: actions/github-script@v7
        with:
          script: |
            // Call Render deploy hook to trigger a new deployment
            const webhookUrl = process.env.RENDER_DEPLOY_HOOK_URL;
            if (!webhookUrl) {
              console.log('RENDER_DEPLOY_HOOK_URL not set — skipping deploy');
              return;
            }
            const response = await fetch(webhookUrl, {
              method: 'POST',
            });
            if (response.ok) {
              console.log('Render deployment triggered successfully');
            } else {
              console.error('Failed to trigger Render deploy:', response.statusText);
            }
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
